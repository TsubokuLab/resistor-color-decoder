<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="IPAGothic, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0e1530"/>
    </linearGradient>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffb020" stop-opacity="0.30"/>
      <stop offset="0.7" stop-color="#ffb020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#5b8cff" stop-opacity="0.30"/>
      <stop offset="0.7" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0dba8"/>
      <stop offset="0.45" stop-color="#e3c98c"/>
      <stop offset="1" stop-color="#c9ad6e"/>
    </linearGradient>
    <linearGradient id="accentText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb020"/>
      <stop offset="1" stop-color="#ffd56b"/>
    </linearGradient>
    <clipPath id="bodyClip">
      <rect x="225" y="402" width="320" height="120" rx="60" ry="60"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1080" cy="20" r="360" fill="url(#g1)"/>
  <circle cx="120" cy="620" r="360" fill="url(#g2)"/>
  <!-- 枠 -->
  <rect x="16" y="16" width="1168" height="598" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- テキスト -->
  <text x="600" y="150" text-anchor="middle" fill="#ffb020" font-size="30" font-weight="bold" letter-spacing="8">RESISTOR COLOR DECODER</text>
  <text x="600" y="262" text-anchor="middle" fill="#eef2ff" font-size="86" font-weight="bold">抵抗カラーコード<tspan fill="url(#accentText)">変換</tspan></text>
  <text x="600" y="340" text-anchor="middle" fill="#9aa6c7" font-size="32">抵抗の色から抵抗値を計算できるツール</text>

  <!-- 抵抗グラフィック ＋ 抵抗値 -->
  <g>
    <line x1="110" y1="462" x2="245" y2="462" stroke="#8a93a8" stroke-width="8" stroke-linecap="round"/>
    <line x1="525" y1="462" x2="610" y2="462" stroke="#8a93a8" stroke-width="8" stroke-linecap="round"/>
    <rect x="225" y="402" width="320" height="120" rx="60" ry="60" fill="url(#bodyGrad)"/>
    <g clip-path="url(#bodyClip)">
      <rect x="300" y="394" width="28" height="136" fill="#d33a2c"/>
      <rect x="352" y="394" width="28" height="136" fill="#d33a2c"/>
      <rect x="420" y="394" width="28" height="136" fill="#7d4a23"/>
      <rect x="488" y="394" width="28" height="136" fill="#c9a227"/>
    </g>
    <!-- 計算結果 -->
    <text x="648" y="498" text-anchor="start" fill="#eef2ff" font-size="130" font-weight="bold">220<tspan fill="url(#accentText)"> Ω</tspan></text>
  </g>

  <!-- フッター -->
  <text x="600" y="592" text-anchor="middle" fill="#5b8cff" font-size="26">tsubokulab.github.io/resistor-color-decoder　·　制作 @kohack_v</text>
</svg>
