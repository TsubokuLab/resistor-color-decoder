<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="IPAGothic, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0e1530"/>
    </linearGradient>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffb020" stop-opacity="0.30"/>
      <stop offset="0.7" stop-color="#ffb020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#5b8cff" stop-opacity="0.30"/>
      <stop offset="0.7" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0dba8"/>
      <stop offset="0.45" stop-color="#e3c98c"/>
      <stop offset="1" stop-color="#c9ad6e"/>
    </linearGradient>
    <linearGradient id="accentText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb020"/>
      <stop offset="1" stop-color="#ffd56b"/>
    </linearGradient>
    <clipPath id="bodyClip">
      <rect x="380" y="358" width="440" height="124" rx="62" ry="62"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1080" cy="20" r="360" fill="url(#g1)"/>
  <circle cx="120" cy="620" r="360" fill="url(#g2)"/>
  <!-- 枠 -->
  <rect x="16" y="16" width="1168" height="598" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- テキスト（上部） -->
  <text x="600" y="120" text-anchor="middle" fill="#ffb020" font-size="29" font-weight="bold" letter-spacing="8">RESISTOR COLOR DECODER</text>
  <text x="600" y="222" text-anchor="middle" fill="#eef2ff" font-size="84" font-weight="bold">抵抗カラーコード<tspan fill="url(#accentText)">変換</tspan></text>
  <text x="600" y="294" text-anchor="middle" fill="#9aa6c7" font-size="30">抵抗の色から抵抗値を計算できるツール</text>

  <!-- 抵抗グラフィック（大きめ） -->
  <g>
    <line x1="240" y1="420" x2="395" y2="420" stroke="#8a93a8" stroke-width="9" stroke-linecap="round"/>
    <line x1="805" y1="420" x2="960" y2="420" stroke="#8a93a8" stroke-width="9" stroke-linecap="round"/>
    <rect x="380" y="358" width="440" height="124" rx="62" ry="62" fill="url(#bodyGrad)"/>
    <g clip-path="url(#bodyClip)">
      <rect x="470" y="350" width="30" height="140" fill="#d33a2c"/>
      <rect x="528" y="350" width="30" height="140" fill="#d33a2c"/>
      <rect x="604" y="350" width="30" height="140" fill="#7d4a23"/>
      <rect x="706" y="350" width="30" height="140" fill="#c9a227"/>
    </g>
    <!-- 抵抗値（抵抗のすぐ下） -->
    <text x="600" y="566" text-anchor="middle" fill="#eef2ff" font-size="62" font-weight="bold">220<tspan fill="url(#accentText)"> Ω</tspan></text>
  </g>
</svg>
